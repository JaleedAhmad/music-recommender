<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood & Music AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar for a better look */
        #chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        #chat-messages::-webkit-scrollbar-track {
            background: #1f2937; /* bg-gray-800 */
        }
        #chat-messages::-webkit-scrollbar-thumb {
            background: #4b5563; /* bg-gray-600 */
            border-radius: 3px;
        }
        #chat-messages::-webkit-scrollbar-thumb:hover {
            background: #6b7280; /* bg-gray-500 */
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

    <div class="w-full max-w-2xl h-full md:h-[90vh] md:max-h-[700px] flex flex-col bg-gray-800 shadow-2xl rounded-lg mx-4">
        <!-- Header -->
        <div class="bg-gray-700 p-4 rounded-t-lg shadow-md border-b border-gray-600">
            <h1 class="text-xl font-bold text-center">Mood & Music AI 🎵</h1>
            <p class="text-sm text-gray-400 text-center">Tell me your mood, I'll find a song for your weather.</p>
        </div>

        <!-- Chat Messages -->
        <div id="chat-messages" class="flex-1 p-6 overflow-y-auto">
            <!-- Messages will be dynamically inserted here -->
        </div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="px-6 pb-2 hidden">
            <div class="flex items-center space-x-2">
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-pulse"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-pulse" style="animation-delay: 0.2s;"></div>
                <div class="w-2 h-2 bg-gray-400 rounded-full animate-pulse" style="animation-delay: 0.4s;"></div>
                <span class="text-sm text-gray-400">AI is thinking...</span>
            </div>
        </div>

        <!-- Input Form -->
        <div class="p-4 bg-gray-800 rounded-b-lg border-t border-gray-700">
            <form id="chat-form" class="flex items-center space-x-4">
                <input 
                    type="text" 
                    id="message-input"
                    placeholder="Type how you're feeling..." 
                    class="flex-1 bg-gray-700 border border-gray-600 rounded-full py-3 px-5 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition duration-300"
                    autocomplete="off"
                >
                <button 
                    type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-full p-3 transition duration-300 shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 focus:ring-indigo-500"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-send"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const typingIndicator = document.getElementById('typing-indicator');

        // Store the entire conversation history
        let messages = [];

        // Function to render messages to the chat window
        const renderMessages = () => {
            chatMessages.innerHTML = ''; // Clear existing messages
            messages.forEach(msg => {
                const messageElement = document.createElement('div');
                messageElement.classList.add('mb-4', 'flex');

                let content = '';
                if (msg.role === 'user') {
                    messageElement.classList.add('justify-end');
                    content = `
                        <div class="bg-indigo-600 text-white rounded-lg rounded-br-none py-2 px-4 max-w-sm">
                            ${msg.text}
                        </div>
                    `;
                } else { // 'bot'
                    messageElement.classList.add('justify-start');
                    content = `
                        <div class="bg-gray-700 text-gray-200 rounded-lg rounded-bl-none py-2 px-4 max-w-sm">
                            ${msg.text}
                        </div>
                    `;
                }
                messageElement.innerHTML = content;
                chatMessages.appendChild(messageElement);
            });
            // Scroll to the latest message
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };
        
        // Function to handle form submission
        const handleSendMessage = async (event) => {
    event.preventDefault();
    const userInput = messageInput.value.trim();
    if (!userInput) return;

    messages.push({ role: 'user', text: userInput });
    renderMessages();
    messageInput.value = '';
    typingIndicator.classList.remove('hidden');

    navigator.geolocation.getCurrentPosition(async (position) => {
        const { latitude, longitude } = position.coords;

        try {
            const encodedMood = encodeURIComponent(userInput);
            const response = await fetch(`http://localhost:3001/api/get-recommendation?lat=${latitude}&lon=${longitude}&mood=${encodedMood}`);
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || 'The server returned an error.');
            }

            const data = await response.json();
            
            // --- NEW: Create a search link for YouTube ---
            const song = data.recommendation.song;
            const artist = data.recommendation.artist;
            const youtubeSearchQuery = encodeURIComponent(`${song} ${artist}`);
            const youtubeLink = `https://www.youtube.com/results?search_query=${youtubeSearchQuery}`;

            const botResponse = `
                <p class="mb-2">Okay, based on the vibe in <strong>${data.location}</strong>, I recommend:</p>
                <div class="mt-3 bg-gray-600 p-3 rounded-md">
                    <p class="font-bold text-lg text-indigo-300">"${song}"</p>
                    <p class="text-sm text-gray-300">by ${artist}</p>
                </div>
                <a href="${youtubeLink}" target="_blank" class="mt-3 inline-block bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-full text-sm">
                    Play on YouTube
                </a>
            `;

            messages.push({ role: 'bot', text: botResponse });
        } catch (error) {
            console.error("API Error:", error);
            messages.push({ role: 'bot', text: `Sorry, I ran into a problem: ${error.message}` });
        } finally {
            typingIndicator.classList.add('hidden');
            renderMessages();
        }

    }, (error) => {
        console.error("Geolocation Error:", error);
        messages.push({ role: 'bot', text: "I couldn't get your location. Please make sure to grant permission." });
        typingIndicator.classList.add('hidden');
        renderMessages();
    });
};
        chatForm.addEventListener('submit', handleSendMessage);

        // Initial greeting message
        window.onload = () => {
            messages.push({ role: 'bot', text: "Hello! How are you feeling right now? Let me know, and I'll find the perfect song for you." });
            renderMessages();
        };

    </script>
</body>
</html>
